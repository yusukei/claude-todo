name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint-and-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            backend/pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --tb=short -q

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing

  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            backend/pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Run pip-audit on backend
        working-directory: backend
        run: uv export --no-hashes -o requirements.txt && pip-audit -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright in container)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # backend と frontend のテストが緑になってから流す (build artifact を使うわけではないが、
    # E2E は重いので前段が壊れている時に走らせて時間を浪費しないようにする).
    needs: [backend-lint-and-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E
        env:
          CI: "true"
        run: |
          docker compose -f e2e/docker-compose.e2e.yml \
              --env-file e2e/.env.e2e \
              run --rm --build e2e-runner

      - name: Dump container logs (on failure)
        if: failure()
        run: |
          mkdir -p e2e/results/container-logs
          for svc in backend frontend traefik mongo redis; do
            docker compose -f e2e/docker-compose.e2e.yml --env-file e2e/.env.e2e \
                logs --no-color --timestamps "$svc" \
                > "e2e/results/container-logs/${svc}.log" 2>&1 || true
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/results/
          retention-days: 7
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e.yml \
              --env-file e2e/.env.e2e \
              down -v --remove-orphans
